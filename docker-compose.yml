# MedParcours AI — chạy 1 lệnh: docker-compose up --build
# File này BẮT BUỘC đặt ở thư mục gốc của repository.

version: '3.8'
services:
  backend:
    build:
      context: ./backend      # Trỏ vào thư mục backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend     # Trỏ vào thư mục frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"             # Giám khảo vào localhost:8080 để xem giao diện
    depends_on:
      - backend